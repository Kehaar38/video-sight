[platformio]
default_envs = ATmega328P

[env:ATmega328P]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; If you use a bare ATmega328P instead of an Arduino Uno,
; switch to a matching board definition and upload settings.
; Example:
; board = ATmega328P
; board_build.f_cpu = 16000000L

build_flags =
  -D INPUT_MCU_I2C_ADDR=0x12

lib_deps =
  ; Add libraries here when the companion MCU grows.

